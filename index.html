<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Biodata Petugas SE 2026</title>
</head>

<body>
<h2>Form Biodata</h2>

<form id="biodataForm">

<input type="text" name="nama_lengkap" placeholder="Nama" required><br><br>
<input type="text" name="nik" placeholder="NIK" required><br><br>
<input type="text" name="nip" placeholder="NIP"><br><br>

<select name="jenis_kelamin" required>
<option value="">Jenis Kelamin</option>
<option value="Laki-laki">Laki-laki</option>
<option value="Perempuan">Perempuan</option>
</select><br><br>

<input type="text" name="tempat_lahir" placeholder="Tempat Lahir" required><br><br>
<input type="date" name="tanggal_lahir" required><br><br>

<input type="text" name="agama" placeholder="Agama" required><br><br>
<input type="text" name="status_perkawinan" placeholder="Status" required><br><br>

<input type="text" name="no_hp" placeholder="No HP" required><br><br>
<input type="email" name="email" placeholder="Email" required><br><br>

<textarea name="alamat" placeholder="Alamat" required></textarea><br><br>

<input type="text" name="status_pegawai" placeholder="Status Pegawai" required><br><br>
<input type="text" name="jabatan" placeholder="Jabatan" required><br><br>
<input type="text" name="provinsi" placeholder="Provinsi" required><br><br>
<input type="text" name="kabupaten" placeholder="Kabupaten" required><br><br>
<input type="text" name="kecamatan" placeholder="Kecamatan" required><br><br>

<input type="text" name="no_sk" placeholder="No SK"><br><br>

<input type="file" id="fotoInput"><br><br>

<input type="hidden" name="latitude" id="latitude">
<input type="hidden" name="longitude" id="longitude">
<input type="hidden" name="accuracy" id="accuracy">
<input type="hidden" name="timestamp" id="timestamp">

<button type="submit">Kirim</button>

</form>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbwXp3cJ-F2wWCu2aaXN8vAjh4RE_Ww5UglVr8OBXBk-8VAqGgdwFiolhQxJSvqyeOznvg/exec";

// ambil lokasi otomatis
navigator.geolocation.getCurrentPosition(function(pos){
  document.getElementById("latitude").value = pos.coords.latitude;
  document.getElementById("longitude").value = pos.coords.longitude;
  document.getElementById("accuracy").value = pos.coords.accuracy;
  document.getElementById("timestamp").value = pos.timestamp;
});

// convert foto ke base64
function getBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=> resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

document.getElementById("biodataForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const formData = new FormData(this);
  let data = {};

  formData.forEach((value,key)=>{
    data[key] = value;
  });

  // ambil foto
  const file = document.getElementById("fotoInput").files[0];
  if(file){
    data.foto_base64 = await getBase64(file);
  } else {
    data.foto_base64 = "";
  }

  fetch(scriptURL,{
    method:"POST",
    body: JSON.stringify(data)
  })
  .then(res=>res.text())
  .then(()=>{
    alert("Berhasil disimpan!");
    document.getElementById("biodataForm").reset();
  })
  .catch(err=>{
    console.error(err);
    alert("Gagal kirim");
  });

});

</script>

</body>
</html>
